name: Lab 03 - Notification Service Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contract
        run: npx @stoplight/spectral-cli lint contracts/notification.openapi.yaml

      - name: Start Prism mock server
        run: nohup npx prism mock contracts/notification.openapi.yaml --port 4010 > prism.log 2>&1 &

      - name: Wait for mock server
        run: npx wait-on http://localhost:4010/health --timeout 30000

      - name: Run Newman tests on mock environment
        run: npx newman run postman/collections/notification.postman_collection.json -e postman/environments/notification_mock.postman_environment.json -r cli,junit --reporter-junit-export reports/newman-report.xml

      - name: Run Jest queue contract tests
        run: npx jest test/queue-contract.test.js --coverage

      - name: Show Prism log on failure
        if: failure()
        run: cat prism.log || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/